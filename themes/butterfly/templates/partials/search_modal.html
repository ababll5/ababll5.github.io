<div class="search-modal" id="search-modal" hidden>
    <div class="search-modal__overlay" id="search-overlay"></div>
    <div class="search-modal__content">
        <div class="search-modal__header">
            <div class="search-modal__input-wrapper">
                <i class="fas fa-search search-modal__icon"></i>
                <input type="text" class="search-modal__input" id="search-input"
                       placeholder="{{ theme.search.placeholder or '搜索文章...' }}" autocomplete="off">
            </div>
            <button class="search-modal__close" id="search-close" aria-label="关闭搜索">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="search-modal__results" id="search-results">
            <div class="search-modal__hint">输入关键词搜索文章...</div>
        </div>
    </div>
</div>
