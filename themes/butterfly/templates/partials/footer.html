<footer class="footer">
    <div class="footer__container">
        <div class="footer__info">
            {% if theme.footer.copyright %}
            <span>&copy; {{ site.since or '2024' }} {{ site.author }}</span>
            {% endif %}
            {% if theme.footer.custom_text %}
            <span class="footer__custom">{{ theme.footer.custom_text }}</span>
            {% endif %}
        </div>
        <div class="footer__links">
            {% for item in theme.nav_menu[:4] %}
            <a href="{{ item.url }}">{{ item.name }}</a>
            {% endfor %}
        </div>
    </div>
</footer>
