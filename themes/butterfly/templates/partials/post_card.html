<article class="post-card">
    <div class="post-card__shell">
        <div class="post-card__inner">
            <div class="post-card__body">
                <div class="post-card__meta">
                    {% if theme.post.show_date %}
                    <time class="post-card__date" datetime="{{ post.date|format_date('%Y-%m-%d') }}">
                        {{ post.date|format_date('%Y-%m-%d') }}
                    </time>
                    {% endif %}
                </div>
                <h2 class="post-card__title">
                    <a href="{{ post.url }}">{{ post.title }}</a>
                </h2>
                <p class="post-card__excerpt">{{ post.excerpt }}</p>
                <div class="post-card__footer">
                    {% if theme.post.show_tags and post.tags %}
                    <div class="post-card__tags">
                        {% for tag in post.tags %}
                        <a class="tag-badge" href="/tags/{{ tag.lower() }}/">{{ tag }}</a>
                        {% endfor %}
                    </div>
                    {% endif %}
                    <a class="post-card__more" href="{{ post.url }}">
                        阅读
                        <span class="arrow-nest">→</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</article>
