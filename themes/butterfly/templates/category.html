{% extends 'base.html' %}
{% block title %}分类: {{ category_name }} - {{ site.title }}{% endblock %}

{% block content %}
<div class="category-page">
    <h1 class="page-title">分类: {{ category_name }}</h1>
    <p class="page-subtitle">共 {{ category_posts|length }} 篇文章</p>

    <div class="post-list">
        {% for post in category_posts %}
        {% include 'partials/post_card.html' %}
        {% endfor %}
    </div>
</div>
{% endblock %}
